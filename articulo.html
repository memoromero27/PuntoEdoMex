<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia | Punto Estado de México</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ESTILOS EXCLUSIVOS DE LA NOTICIA (Caja Blanca, Textos, Botones) */
        body {
            background-color: #f4f6f8; 
        }

        /* --- LAYOUT 3 COLUMNAS PARA CENTRADO EXACTO Y ANUNCIO STICKY --- */
        .layout-articulo-centrado {
            display: grid;
            grid-template-columns: 1fr minmax(300px, 800px) 1fr;
            gap: 30px;
            max-width: 96%;
            margin: 35px auto 60px auto;
            padding: 0 15px;
        }

        /* Columna 1: Espacio invisible de balanceo */
        .columna-spacer-izq {
            width: 100%;
        }

        /* Columna 2: La noticia centrada */
        .columna-noticia {
            width: 100%;
            min-width: 0;
        }

        /* Columna 3: El anuncio a la derecha de la nota */
        .columna-sidebar-der {
            width: 100%;
            max-width: 340px;
            justify-self: start;
            height: 100%; /* Permite que la columna se extienda a todo lo alto de la nota */
        }

        /* Recuadro del anuncio flotante (Sticky) */
        .widget-publicidad-sticky {
            position: sticky;
            top: 110px; /* Se fija a 110px del techo al hacer scroll */
            z-index: 10;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* --- ESTILOS INTERNOS DE LA NOTICIA --- */
        .contenedor-noticia {
            width: 100%;
            max-width: 100%;
            margin: 0 0 60px 0;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden; 
            box-sizing: border-box;
        }

        .portada-noticia {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }

        .contenido-texto {
            padding: 40px 30px;
        }

        .titulo-noticia {
            font-family: 'Oswald', sans-serif;
            color: #1a1a1a;
            font-size: 40px;
            line-height: 1.2;
            margin: 0 0 15px 0;
        }

        .subtitulo-noticia {
            font-family: 'Roboto', sans-serif;
            font-style: italic; 
            color: #555;
            font-size: 22px;
            margin: 0 0 15px 0;
            font-weight: 400;
        }

        .autor-noticia {
            font-family: 'Roboto', sans-serif;
            color: #cc4d00; 
            font-size: 17px;
            font-weight: 700;
            margin: 0 0 25px 0;
            text-transform: uppercase;
        }

        .cuerpo-noticia {
            font-family: 'Roboto', sans-serif;
            line-height: 1.8;
            color: #333;
            font-size: 19px;
            white-space: pre-wrap; 
        }

        .contenedor-botones {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            align-items: center;
        }

        .btn-accion {
            display: block;
            background-color: #F75D04;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Roboto', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: center;
            width: 100%;
            max-width: 320px;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-accion:hover {
            background-color: #d64d03;
        }

        .btn-facebook {
            background-color: #1877F2; 
        }

        .btn-facebook:hover {
            background-color: #166FE5;
        }
        
        /* --- ADAPTACIÓN PARA CELULARES Y TABLETS --- */
        @media (max-width: 992px) {
            .layout-articulo-centrado {
                display: flex;
                flex-direction: column;
                max-width: 100%;
                gap: 25px;
                margin-top: 20px;
            }
            .columna-spacer-izq {
                display: none;
            }
            .columna-sidebar-der {
                max-width: 100%;
                width: 100%;
                height: auto;
            }
            .widget-publicidad-sticky {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .titulo-noticia { font-size: 30px; }
            .subtitulo-noticia { font-size: 19px; }
            .contenido-texto { padding: 25px 20px; }
            .contenedor-noticia { margin: 0 0 20px 0; border-radius: 0;}
        }
    </style>
</head>
<body>

    <div class="header-background-wrapper">
        <div class="header-main container">
            <div class="site-branding">
                <a href="index.html">
                    <img src="img/Punto 1.png" alt="Logotipo Punto Estado de México" class="site-logo">
                </a>
            </div>
        </div>
    </div>

    <nav id="site-navigation" class="main-navigation">
        <div class="container">
            <div class="menu-toggle" id="mobile-menu-btn">☰ Menú</div>
            <ul class="nav-menu" id="primary-menu">
                <li class=""><a href="index.html">Inicio</a></li>
            </ul>
        </div>
    </nav>
    
    <main id="main" class="layout-articulo-centrado">
        
        <div class="columna-spacer-izq"></div>

        <div class="columna-noticia">
            <article class="contenedor-noticia">
                <div id="noticia-completa">
                    <h3 style="text-align: center; color: #555; padding: 50px 0;">
                        Cargando la noticia...
                    </h3>
                </div>
            </article>
        </div>

        <aside class="columna-sidebar-der">
            <div class="widget-publicidad-sticky">
                <h3 class="widget-title"><span>Publicidad</span></h3>
                <a href="TU_LINK_EXTERNO_AQUI" target="_blank" rel="noopener noreferrer" style="display: block;">
                    <img src="img/EP400x400.jpg" alt="Publicidad" style="width: 100%; height: auto; border-radius: 8px; display: block;">
                </a>
            </div>
        </aside>

    </main>
    

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const contenedor = document.getElementById('noticia-completa');
            
            try {
                const supabaseUrl = 'https://yeigwlusrivrdbkjrnpp.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllaWd3bHVzcml2cmRia2pybnBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODM3NjQsImV4cCI6MjA5ODg1OTc2NH0.M-e480U5iuyH1FctwZtdiTIKD5HMklxu10LXINx2r6U';
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                const parametrosURL = new URLSearchParams(window.location.search);
                const noticiaId = parametrosURL.get('id');

                if (!noticiaId) {
                    contenedor.innerHTML = '<h2 style="color:red; text-align:center; padding: 40px;">Error: No se encontró la noticia.</h2>';
                    return;
                }

                const { data: noticia, error } = await supabase
                    .from('noticias') 
                    .select('*')
                    .eq('id', noticiaId)
                    .single();

                if (error) throw error;

                contenedor.innerHTML = `
                    <img src="${noticia.imagen_url}" alt="Imagen de la noticia" class="portada-noticia">
                    
                    <div class="contenido-texto">
                        <h1 class="titulo-noticia">${noticia.titulo}</h1>
                        
                        ${noticia.subtitulo ? `<h2 class="subtitulo-noticia">${noticia.subtitulo}</h2>` : ''}
                        ${noticia.autor ? `<div class="autor-noticia">${noticia.autor}</div>` : ''}
                        
                        <div class="cuerpo-noticia">${noticia.cuerpo}</div>

                        <div class="contenedor-botones">
                            <button id="btn-copiar" class="btn-accion">Copiar enlace de la noticia</button>
                            <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="btn-accion btn-facebook">Compartir en Facebook</a>
                            
                            <a href="index.html" class="btn-accion">⬅ Volver atrás</a>
                        </div>
                    </div>
                `;

                const inyectarMetaTag = (propiedad, contenido) => {
                    let meta = document.createElement('meta');
                    meta.setAttribute('property', propiedad);
                    meta.setAttribute('content', contenido);
                    document.head.appendChild(meta);
                };

                inyectarMetaTag('og:title', noticia.titulo);
                inyectarMetaTag('og:image', noticia.imagen_url);
                inyectarMetaTag('og:url', window.location.href);
                inyectarMetaTag('og:type', 'article');

                const btnCopiar = document.getElementById('btn-copiar');
                btnCopiar.addEventListener('click', () => {
                    navigator.clipboard.writeText(window.location.href).then(() => {
                        btnCopiar.textContent = '✅ ¡Enlace copiado!';
                        btnCopiar.style.backgroundColor = '#28a745'; 
                        
                        setTimeout(() => {
                            btnCopiar.textContent = 'Copiar enlace de la noticia';
                            btnCopiar.style.backgroundColor = '#F75D04';
                        }, 3000);
                    }).catch(err => {
                        console.error('Error al copiar: ', err);
                        alert('No se pudo copiar el enlace.');
                    });
                });

            } catch (error) {
                console.error("Fallo:", error);
                contenedor.innerHTML = '<h2 style="color:red; text-align:center; padding: 40px;">Error al cargar la noticia.</h2>';
            }
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
